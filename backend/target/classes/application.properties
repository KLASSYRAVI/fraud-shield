spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/frauddb}
spring.datasource.username=${DB_USER:fraud}
spring.datasource.password=${DB_PASSWORD:fraud123}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

jwt.secret=${JWT_SECRET:mySuperSecretJwtTokenWithAtLeast256BitsForHmacSha256SignatureAlgorithm12345678}
jwt.expiration=86400000

ml.service.url=${ML_SERVICE_URL:http://localhost:8000}

# To enable lazy loading inside views and proper object serialization
spring.jpa.open-in-view=false

server.port=8080
